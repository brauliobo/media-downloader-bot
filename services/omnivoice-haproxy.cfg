global
    maxconn 256
    log stdout format raw local0
    user haproxy
    group haproxy
    chroot /usr/share/haproxy

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    timeout queue 30m

frontend omnivoice
    bind 127.0.0.1:10440
    default_backend omnivoice_nodes

backend omnivoice_nodes
    balance leastconn
    option tcp-check
    option http-server-close
    default-server check inter 5s fall 2 rise 2 maxconn 1

    server whitebeast0 127.0.0.1:10450
    server whitebeast1 127.0.0.1:10451
    server phoenix0 10.0.0.11:10440
    server chicopc0 10.0.0.15:10440
    server chicopc1 10.0.0.15:10441
    server back1-0 10.0.0.7:10440
    server back1-1 10.0.0.7:10441

    # Add Bhavapower after the host is reachable.
    # server bhava0 10.0.0.14:10440
    # server bhava1 10.0.0.14:10441
